      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: analytics-engine
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5010
    ports:
      - "5010:5010"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5010/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:

networks:
  observability-network:
    driver: bridge
