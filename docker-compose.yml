version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - observability-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  event-bus:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: event-bus
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5008
    ports:
      - "5008:5008"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5008/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  metrics-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: metrics-service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5003
    ports:
      - "5003:5003"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  alert-engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: alert-engine
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5004
    ports:
      - "5004:5004"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-analysis:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ai-analysis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_HOST=http://host.docker.internal:11434
      - PORT=5005
    ports:
      - "5005:5005"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  incident-correlation:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: incident-correlation
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5006
    ports:
      - "5006:5006"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5007
    ports:
      - "5007:5007"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  websocket-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: websocket-gateway
    ports:
      - "3001:3001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  infrastructure-registry:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: infrastructure-registry
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5002
    ports:
      - "5002:5002"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  log-workers:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: log-workers
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5009
    ports:
      - "5009:5009"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5009/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  analytics-engine:
